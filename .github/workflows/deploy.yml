name: Deploy to GCP VM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/tma/**'
      - 'packages/shared/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: ${{ secrets.MCP_COOP_ORG_PROJECT_ID }}
  REGION: ${{ secrets.MCP_COOP_ORG_REGION }}
  REPO_NAME: ${{ secrets.MCP_COOP_ORG_REPO_NAME }}
  IMAGE_NAME: 'unbogi-mfe'
  GAR_LOCATION: ${{ secrets.MCP_COOP_ORG_GAR_LOCATION }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud without JSON keys (WIF)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.MCP_COOP_ORG_GCP_WIF_PROVIDER }}
          service_account: 'mcp-coop-github-actions@${{ secrets.MCP_COOP_ORG_PROJECT_ID }}.iam.gserviceaccount.com'
          token_format: 'access_token'

      # 2. Configure Docker for Google Artifact Registry
      - name: Configure Docker for GAR
        uses: 'docker/login-action@v3'
        with:
          registry: '${{ env.GAR_LOCATION }}'
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      # 3. Build and Push 
      - name: Build and Push Docker Image
        run: |
          IMAGE_URI="${GAR_LOCATION}/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}"
          # We pass environment variables for Firebase at build time
          docker build \
            --build-arg UNBOGI_FIREBASE_API_KEY=${{ secrets.UNBOGI_FIREBASE_API_KEY }} \
            --build-arg UNBOGI_FIREBASE_AUTH_DOMAIN=${{ secrets.UNBOGI_FIREBASE_AUTH_DOMAIN }} \
            --build-arg UNBOGI_FIREBASE_PROJECT_ID=${{ secrets.UNBOGI_FIREBASE_PROJECT_ID }} \
            --build-arg UNBOGI_FIREBASE_STORAGE_BUCKET=${{ secrets.UNBOGI_FIREBASE_STORAGE_BUCKET }} \
            --build-arg UNBOGI_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.UNBOGI_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg UNBOGI_FIREBASE_APP_ID=${{ secrets.UNBOGI_FIREBASE_APP_ID }} \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:${{ github.sha }} \
            .
          
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ github.sha }}

  deploy-to-vm:
    name: Deploy to VM via SSH
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Copy the production docker-compose file to the VM
      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MCP_COOP_ORG_VM_IP }}
          username: ${{ secrets.MCP_COOP_ORG_VM_USER }}
          key: ${{ secrets.MCP_COOP_ORG_VM_SSH_KEY }}
          source: ".github/deploy/docker-compose.prod.yml"
          target: "~/unbogi-mfe"
          strip_components: 2

      # 2. Execute SSH commands to update and restart containers
      - name: Run Deploy scripts via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MCP_COOP_ORG_VM_IP }}
          username: ${{ secrets.MCP_COOP_ORG_VM_USER }}
          key: ${{ secrets.MCP_COOP_ORG_VM_SSH_KEY }}
          envs: GAR_LOCATION, PROJECT_ID, REPO_NAME, IMAGE_NAME
          script: |
            set -e

            export IMAGE_URI="${GAR_LOCATION}/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}"
            
            mkdir -p ~/unbogi-mfe
            cd ~/unbogi-mfe

            # Configure Docker auth on the VM using the VM's default service account
            gcloud auth configure-docker ${GAR_LOCATION} --quiet || true

            # Rename config for standard convenience (SCP puts it here)
            mv ~/unbogi-mfe/docker-compose.prod.yml ./docker-compose.yml || true

            # Pull the new image and recreate containers
            IMAGE_URI=${IMAGE_URI} docker-compose pull
            IMAGE_URI=${IMAGE_URI} docker-compose up -d --remove-orphans

            # Clean up old images to explicitly save disk space
            docker image prune -a -f
